name: "Midnight Fire — prenotazione automatica parcheggio"

on:
  # Mezzanotte ora italiana (GitHub Actions usa sempre UTC).
  # In pratica GitHub ritarda i job schedulati di ~60 min nelle ore di punta,
  # quindi anticipiamo di un'ora per compensare:
  #   CEST apr–ott: UTC+2 → target 23:00 CEST = 21:00 UTC  ← attivo ora
  #   CET  ott–apr: UTC+1 → target 23:00 CET  = 22:00 UTC  ← cambiare in ottobre
  schedule:
    - cron: "0 21 * * *"   # target 23:00 CEST → arriva ~mezzanotte (CEST, estate)
    - cron: "30 8 * * *"   # TEST: 10:30 CEST — rimuovere dopo il test
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run: mostra la queue senza eseguire prenotazioni"
        type: boolean
        default: true

permissions:
  contents: write   # per fare git push della queue aggiornata
  issues: write     # per creare issue di notifica

jobs:
  fire:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installa parkbot
        run: pip install -e .

      - name: Prepara secrets
        run: |
          mkdir -p "$GITHUB_WORKSPACE/secrets"
          chmod 700 "$GITHUB_WORKSPACE/secrets"
          python3 - << 'PYEOF'
          import json, os, time

          base = os.environ["GITHUB_WORKSPACE"]

          # tokens.json
          tokens_path = os.path.join(base, "secrets", "tokens.json")
          data = {"refresh_token": os.environ["COGNITO_REFRESH_TOKEN"], "saved_at": time.time()}
          with open(tokens_path, "w") as f:
              json.dump(data, f)
          os.chmod(tokens_path, 0o600)

          # telegram.json
          tg_path = os.path.join(base, "secrets", "telegram.json")
          tg = {
              "bot_token": os.environ["TELEGRAM_BOT_TOKEN"],
              "allowed_chat_id": int(os.environ["TELEGRAM_CHAT_ID"]),
          }
          with open(tg_path, "w") as f:
              json.dump(tg, f)
          os.chmod(tg_path, 0o600)

          print("Secrets pronti")
          PYEOF
        env:
          COGNITO_REFRESH_TOKEN: ${{ secrets.COGNITO_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Mostra queue corrente
        env:
          PARKBOT_STATE_DIR: ${{ github.workspace }}
        run: parkbot list || echo "(queue vuota)"

      - name: Esegui parkbot fire
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          PARKBOT_STATE_DIR: ${{ github.workspace }}
        run: parkbot fire

      - name: Dry run — skip prenotazioni
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: echo "Dry run attivo — nessuna prenotazione eseguita"

      - name: Aggiorna refresh_token se ruotato
        if: always()
        run: |
          python3 - << 'PYEOF'
          import json, os, sys

          tokens_path = os.path.join(os.environ["GITHUB_WORKSPACE"], "secrets", "tokens.json")
          if not os.path.exists(tokens_path):
              print("tokens.json non trovato, skip")
              sys.exit(0)

          with open(tokens_path) as f:
              current = json.load(f)

          new_token = current.get("refresh_token", "")
          old_token = os.environ.get("COGNITO_REFRESH_TOKEN_ORIG", "")

          if new_token and new_token != old_token:
              print("Refresh token ruotato — aggiorna manualmente il secret COGNITO_REFRESH_TOKEN su GitHub")
              print(f"Nuovo valore (prime 20 char): {new_token[:20]}...")
              # Scrive in GITHUB_OUTPUT per eventuale uso futuro
              with open(os.environ.get("GITHUB_OUTPUT", "/dev/null"), "a") as out:
                  out.write(f"token_rotated=true\n")
          else:
              print("Refresh token invariato")
          PYEOF
        env:
          COGNITO_REFRESH_TOKEN_ORIG: ${{ secrets.COGNITO_REFRESH_TOKEN }}

      - name: Notifica via GitHub Issue
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          PARKBOT_STATE_DIR: ${{ github.workspace }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - << 'PYEOF'
          import os, json, subprocess
          from pathlib import Path

          state_dir = os.environ["PARKBOT_STATE_DIR"]
          queue_dir = Path(state_dir) / "queue"

          done    = sorted(queue_dir.glob("*-parking.done.json"))
          waiting = sorted(queue_dir.glob("*-parking.json"))
          failed  = sorted(queue_dir.glob("*-parking.failed-*.json"))

          # Leggi prenotazioni confermate sul portale
          confirmed = []
          try:
              import sys
              sys.path.insert(0, f"{state_dir}/src")
              from parkbot.tokens import get_access_token
              from parkbot.booking import list_future_bookings
              bundle = get_access_token()
              for b in list_future_bookings(token=bundle):
                  spot  = b.get("posti_codice", "—")
                  targa = b.get("targa", "")
                  targa_str = f" · targa {targa}" if targa else ""
                  confirmed.append(f"- {b['data']} — posto **{spot}**{targa_str}")
          except Exception:
              pass

          lines = []
          if done:
              lines.append("## ✅ Prenotato questa notte")
              for f in done:
                  d = json.loads(f.read_text()).get("date", f.stem.split("-parking")[0])
                  lines.append(f"- {d}")
          if waiting:
              lines.append("## ⏳ In coda (fuori finestra o non disponibile)")
              for f in waiting:
                  d = json.loads(f.read_text()).get("date", f.stem.split("-parking")[0])
                  lines.append(f"- {d} — riprovo domani notte")
          if failed:
              lines.append("## ❌ Falliti")
              for f in failed:
                  d = json.loads(f.read_text()).get("date", f.stem.split("-parking")[0])
                  lines.append(f"- {d}")
          if confirmed:
              lines.append("## 📋 Prenotazioni confermate sul portale")
              lines.extend(confirmed)

          if not lines:
              print("Nessuna attività da notificare — skip issue")
              exit(0)

          today = __import__("datetime").date.today().strftime("%d/%m/%Y")
          title = f"🅿️ Riepilogo parcheggio {today}"
          body  = "\n".join(lines) + "\n\n---\n*Questa issue viene chiusa automaticamente — serve solo come notifica email.*"

          subprocess.run([
              "gh", "issue", "create",
              "--title", title,
              "--body",  body,
              "--label", "parkbot",
          ], check=False)

          # Chiudi subito la issue appena creata
          result = subprocess.run(
              ["gh", "issue", "list", "--label", "parkbot", "--state", "open", "--json", "number", "--limit", "1"],
              capture_output=True, text=True
          )
          issues = json.loads(result.stdout or "[]")
          if issues:
              num = issues[0]["number"]
              subprocess.run(["gh", "issue", "close", str(num), "--comment", "Notifica inviata ✓"], check=False)
              print(f"Issue #{num} creata e chiusa")
          PYEOF

      - name: Commit queue aggiornata
        if: always()
        run: |
          git config user.name  "parkbot-actions"
          git config user.email "parkbot@users.noreply.github.com"
          git add queue/
          if git diff --cached --quiet; then
            echo "Nessuna modifica alla queue"
          else
            git commit -m "chore: queue update $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"
            git push
          fi
