name: "Setup — configurazione iniziale parkbot"

# Eseguire UNA VOLTA dopo aver creato il repo dal template.
# Salva tutti i secrets, registra il webhook Telegram e verifica che tutto funzioni.

on:
  workflow_dispatch:
    inputs:
      cognito_refresh_token:
        description: "Cognito refresh_token (dal browser DevTools sul portale MFN)"
        required: true
        type: string
      telegram_bot_token:
        description: "Token del bot Telegram (da BotFather, es. 123456:AABBcc...)"
        required: true
        type: string
      telegram_chat_id:
        description: "Telegram Chat ID (numero intero, es. 228967801)"
        required: true
        type: string
      cloudflare_worker_url:
        description: "URL Cloudflare Worker (es. parkbot-webhook.xxx.workers.dev)"
        required: true
        type: string
      setup_pat:
        description: "GitHub PAT temporaneo con scope repo+workflow (serve per salvare i secrets)"
        required: true
        type: string

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Maschera tutti i valori sensibili nei log
        env:
          T1: ${{ github.event.inputs.cognito_refresh_token }}
          T2: ${{ github.event.inputs.telegram_bot_token }}
          T3: ${{ github.event.inputs.setup_pat }}
        run: |
          echo "::add-mask::$T1"
          echo "::add-mask::$T2"
          echo "::add-mask::$T3"

      - name: Salva secrets su GitHub
        env:
          GH_TOKEN: ${{ github.event.inputs.setup_pat }}
          VAL_COGNITO:  ${{ github.event.inputs.cognito_refresh_token }}
          VAL_TG_TOKEN: ${{ github.event.inputs.telegram_bot_token }}
          VAL_TG_CHAT:  ${{ github.event.inputs.telegram_chat_id }}
        run: |
          echo "$VAL_COGNITO"  | gh secret set COGNITO_REFRESH_TOKEN  --repo "$GITHUB_REPOSITORY"
          echo "$VAL_TG_TOKEN" | gh secret set TELEGRAM_BOT_TOKEN     --repo "$GITHUB_REPOSITORY"
          echo "$VAL_TG_CHAT"  | gh secret set TELEGRAM_CHAT_ID       --repo "$GITHUB_REPOSITORY"
          echo "✓ Secrets salvati"

      - name: Registra webhook Telegram
        env:
          BOT_TOKEN:  ${{ github.event.inputs.telegram_bot_token }}
          WORKER_URL: ${{ github.event.inputs.cloudflare_worker_url }}
        run: |
          # Normalizza URL
          [[ "$WORKER_URL" != https://* ]] && WORKER_URL="https://$WORKER_URL"
          echo "Webhook URL: $WORKER_URL"
          RESP=$(curl -s "https://api.telegram.org/bot${BOT_TOKEN}/setWebhook?url=${WORKER_URL}")
          echo "Risposta Telegram: $RESP"
          echo "$RESP" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          if d.get('ok'):
              print('✓ Webhook registrato')
          else:
              print(f'✗ Webhook fallito: {d}')
              sys.exit(1)
          "

      - name: Verifica token MFN e raggiungibilità portale
        env:
          COGNITO_TOKEN: ${{ github.event.inputs.cognito_refresh_token }}
        run: |
          pip install httpx --quiet
          python3 - << 'PYEOF'
          import httpx, os, sys

          token = os.environ["COGNITO_TOKEN"]

          r = httpx.post(
              "https://parcheggi-milanofiori-nord.auth.eu-south-1.amazoncognito.com/oauth2/token",
              data={
                  "grant_type": "refresh_token",
                  "refresh_token": token,
                  "client_id": "3okj0mmk5fhbvs4afddf9002h8",
              },
              headers={"Content-Type": "application/x-www-form-urlencoded"},
              timeout=15,
          )
          if r.status_code != 200:
              print(f"✗ Token Cognito non valido: HTTP {r.status_code}")
              sys.exit(1)

          access_token = r.json()["access_token"]

          r2 = httpx.get(
              "https://parcheggimilanofiorinord.it/app/api/prenotazioni/future",
              headers={"Authorization": f"Bearer {access_token}"},
              timeout=15,
          )
          if r2.status_code == 200:
              bookings = r2.json()
              print(f"✓ Token MFN valido — {len(bookings)} prenotazione/i trovata/e sul portale")
          else:
              print(f"✗ Portale non raggiungibile: HTTP {r2.status_code}")
              sys.exit(1)
          PYEOF

      - name: Riepilogo setup
        run: |
          echo ""
          echo "================================================"
          echo "  ✅ Setup completato con successo!"
          echo "================================================"
          echo ""
          echo "Prossimi passi:"
          echo ""
          echo "1. Crea il Cloudflare Worker:"
          echo "   - Vai su dash.cloudflare.com → Workers & Pages → Create Worker"
          echo "   - Nome: parkbot-webhook"
          echo "   - Sostituisci il codice con quello in SETUP.md"
          echo "   - Aggiungi secrets: GITHUB_PAT e ALLOWED_CHAT_ID"
          echo "   - Deploy"
          echo ""
          echo "2. Manda /start al tuo bot Telegram per verificare"
          echo "3. Poi /help per vedere i comandi disponibili"
