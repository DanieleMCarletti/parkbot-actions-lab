name: "Bot — gestione comandi Telegram"

on:
  repository_dispatch:
    types: [telegram-command]

permissions:
  contents: write

jobs:
  handle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installa parkbot
        run: pip install -e .

      - name: Prepara secrets
        run: |
          mkdir -p "$GITHUB_WORKSPACE/secrets"
          chmod 700 "$GITHUB_WORKSPACE/secrets"
          python3 - << 'PYEOF'
          import json, os, time
          base = os.environ["GITHUB_WORKSPACE"]
          with open(f"{base}/secrets/tokens.json", "w") as f:
              json.dump({"refresh_token": os.environ["COGNITO_REFRESH_TOKEN"], "saved_at": time.time()}, f)
          os.chmod(f"{base}/secrets/tokens.json", 0o600)
          with open(f"{base}/secrets/telegram.json", "w") as f:
              json.dump({"bot_token": os.environ["TELEGRAM_BOT_TOKEN"], "allowed_chat_id": int(os.environ["TELEGRAM_CHAT_ID"])}, f)
          os.chmod(f"{base}/secrets/telegram.json", 0o600)
          PYEOF
        env:
          COGNITO_REFRESH_TOKEN: ${{ secrets.COGNITO_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Gestisci comando
        env:
          PARKBOT_STATE_DIR: ${{ github.workspace }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          COMMAND: ${{ github.event.client_payload.command }}
          ARGS: ${{ github.event.client_payload.args }}
          CHAT_ID: ${{ github.event.client_payload.chat_id }}
        run: |
          python3 - << 'EOF'
          import os, sys
          import httpx

          os.environ.setdefault("PARKBOT_STATE_DIR", os.environ["GITHUB_WORKSPACE"])
          from parkbot import config, dateparse
          from parkbot.booking import list_future_bookings
          from parkbot.tokens import get_access_token
          from parkbot import queue as q

          command = os.environ.get("COMMAND", "").lower().strip()
          args    = os.environ.get("ARGS", "").strip()
          chat_id = os.environ.get("CHAT_ID", "")
          token   = os.environ.get("TELEGRAM_BOT_TOKEN", "")

          def send(text):
              httpx.post(
                  f"https://api.telegram.org/bot{token}/sendMessage",
                  json={"chat_id": chat_id, "text": text, "parse_mode": "HTML"},
                  timeout=10,
              )

          def send_status(prefix_lines):
              """Aggiunge riepilogo coda + prenotazioni confermate al messaggio."""
              lines = list(prefix_lines)
              # Prenotazioni in coda
              entries = q.list_queue()
              if entries:
                  lines.append("")
                  lines.append("📋 <b>In coda:</b>")
                  for e in entries:
                      lines.append(f"  • {dateparse.to_display(e.date)}")
              else:
                  lines.append("")
                  lines.append("📋 Nessuna altra prenotazione in coda.")
              # Prenotazioni confermate sul portale
              try:
                  bundle = get_access_token()
                  bookings = list_future_bookings(token=bundle)
                  if bookings:
                      lines.append("")
                      lines.append("✅ <b>Confermate sul portale:</b>")
                      for b in bookings:
                          spot = b.get("posti_codice", "—")
                          targa = b.get("targa", "")
                          targa_str = f" · targa {targa}" if targa else ""
                          lines.append(f"  • {dateparse.to_display(b['data'])} — posto <b>{spot}</b>{targa_str}")
              except Exception:
                  pass
              send("\n".join(lines))

          if command == "/park":
              if not args:
                  send("❌ Uso: /park &lt;data&gt;\nEsempio: /park giovedì")
                  sys.exit(0)
              try:
                  iso = dateparse.parse_date(args)
              except Exception:
                  send(f"❌ Data non riconosciuta: <b>{args}</b>")
                  sys.exit(0)
              _, created = q.queue_booking(iso, "parking", source="telegram")
              if created:
                  send_status([f"✅ Aggiunto in coda: <b>{dateparse.to_display(iso)}</b>"])
              else:
                  send_status([f"ℹ️ <b>{dateparse.to_display(iso)}</b> era già in coda."])

          elif command == "/list":
              send_status(["📋 <b>Stato prenotazioni:</b>"])

          elif command == "/cancel":
              if not args:
                  send("❌ Uso: /cancel &lt;data&gt;")
                  sys.exit(0)
              try:
                  iso = dateparse.parse_date(args)
              except Exception:
                  send(f"❌ Data non riconosciuta: <b>{args}</b>")
                  sys.exit(0)
              path = config.QUEUE_DIR / f"{iso}-parking.json"
              if path.exists():
                  path.unlink()
                  send(f"🗑️ Rimosso: <b>{dateparse.to_display(iso)}</b>")
              else:
                  send(f"ℹ️ Nessuna prenotazione in coda per {dateparse.to_display(iso)}.")

          elif command == "/future":
              try:
                  bundle = get_access_token()
                  bookings = list_future_bookings(token=bundle)
                  if not bookings:
                      send("📅 Nessuna prenotazione futura sul portale.")
                  else:
                      lines = ["📅 <b>Prenotazioni confermate:</b>"]
                      for b in bookings:
                          spot = b.get("posti_codice", "—")
                          targa = b.get("targa", "")
                          targa_str = f" · targa {targa}" if targa else ""
                          lines.append(f"  • {dateparse.to_display(b['data'])} — posto <b>{spot}</b>{targa_str}")
                      send("\n".join(lines))
              except Exception as e:
                  send(f"❌ Errore API: {e}")

          elif command == "/card":
              import json
              from pathlib import Path

              import unicodedata

              def strip_accents(s):
                  return ''.join(
                      c for c in unicodedata.normalize('NFD', s)
                      if unicodedata.category(c) != 'Mn'
                  ).lower()

              state_dir = Path(os.environ["PARKBOT_STATE_DIR"])
              search_state = state_dir / "state" / "card_search.json"
              search_state.parent.mkdir(exist_ok=True)

              def send_photo(image_url, caption=""):
                  httpx.post(
                      f"https://api.telegram.org/bot{token}/sendPhoto",
                      json={"chat_id": chat_id, "photo": image_url, "caption": caption, "parse_mode": "HTML"},
                      timeout=15,
                  )

              def send_card(card):
                  attrs = card.get("attributes", {})
                  title = attrs.get("title", "?")
                  images = attrs.get("latest_printing_images", {})
                  img_url = None
                  for style in ("nrdb_classic", "nrdb"):
                      if style in images:
                          img_url = images[style].get("large") or images[style].get("medium")
                          break
                  if img_url:
                      faction = attrs.get("faction", {}).get("data", {}).get("attributes", {}).get("name", "")
                      caption = f"<b>{title}</b>"
                      if faction:
                          caption += f" — {faction}"
                      send_photo(img_url, caption)
                  else:
                      send(f"🃏 <b>{title}</b>\n(immagine non disponibile)")

              # /card <numero> → selezione da ricerca precedente
              if args.isdigit():
                  if search_state.exists():
                      saved = json.loads(search_state.read_text())
                      idx = int(args) - 1
                      if 0 <= idx < len(saved):
                          send_card(saved[idx])
                      else:
                          send(f"❌ Numero non valido. Scegli tra 1 e {len(saved)}.")
                  else:
                      send("❌ Nessuna ricerca precedente. Usa /card &lt;nome&gt;.")
                  sys.exit(0)

              if not args:
                  send("❌ Uso: /card &lt;nome&gt;\nEsempio: /card hedge fund")
                  sys.exit(0)

              # Cerca via API v3 — prima con query originale, poi normalizzata
              def search_api(query):
                  r = httpx.get(
                      "https://api.netrunnerdb.com/api/v3/public/cards",
                      params={"filter[search]": query},
                      timeout=15,
                  )
                  if r.status_code != 200:
                      return None, r.status_code
                  return r.json().get("data", []), 200

              data, status = search_api(args)
              if data is None:
                  send(f"❌ Errore API NetrunnerDB: HTTP {status}")
                  sys.exit(0)

              # Se nessun risultato, riprova con query normalizzata (strip accenti)
              if not data:
                  normalized_query = strip_accents(args)
                  if normalized_query != args.lower():
                      data, status = search_api(normalized_query)
                      if data is None:
                          data = []
              # Filtro client-side: ordina per match esatto nel titolo normalizzato
              if data:
                  q_norm = strip_accents(args)
                  data.sort(key=lambda c: (
                      0 if strip_accents(c.get("attributes", {}).get("title", "")) == q_norm else
                      1 if q_norm in strip_accents(c.get("attributes", {}).get("title", "")) else 2
                  ))
              if not data:
                  send(f"🔍 Nessuna carta trovata per: <b>{args}</b>")
                  sys.exit(0)

              if len(data) == 1:
                  send_card(data[0])
                  search_state.unlink(missing_ok=True)
              else:
                  # Salva risultati e manda lista
                  search_state.write_text(json.dumps(data))
                  lines = [f"🔍 Trovate <b>{len(data)}</b> carte per «{args}»:\n"]
                  for i, card in enumerate(data[:10], 1):
                      attrs = card.get("attributes", {})
                      title = attrs.get("title", "?")
                      faction = attrs.get("faction", {}).get("data", {}).get("attributes", {}).get("name", "")
                      faction_str = f" <i>({faction})</i>" if faction else ""
                      lines.append(f"{i}. {title}{faction_str}")
                  if len(data) > 10:
                      lines.append(f"\n… e altre {len(data)-10}. Affina la ricerca.")
                  lines.append("\nRispondi con /card &lt;numero&gt; per vedere l'immagine.")
                  send("\n".join(lines))

          elif command in ("/help", "/start"):
              send(
                  "🅿️ <b>Parkbot — comandi disponibili:</b>\n\n"
                  "/park &lt;data&gt; — prenota (es: /park giovedì)\n"
                  "/list — mostra prenotazioni in coda\n"
                  "/cancel &lt;data&gt; — rimuovi dalla coda\n"
                  "/future — prenotazioni confermate sul portale\n"
                  "/card &lt;nome&gt; — cerca una carta Netrunner\n"
                  "/help — questo messaggio\n\n"
                  "Date accettate: oggi, domani, dopodomani, lunedì…domenica, gg/mm/aaaa"
              )

          else:
              send(f"❓ Comando non riconosciuto: {command}\nUsa /help per la lista.")
          EOF

      - name: Commit queue se modificata
        run: |
          git config user.name  "parkbot-actions"
          git config user.email "parkbot@users.noreply.github.com"
          git add queue/ state/
          if git diff --cached --quiet; then
            echo "Nessuna modifica"
          else
            git commit -m "chore: queue/state update via bot [skip ci]"
            git push
          fi
